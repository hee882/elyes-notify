name: Elyes 모집공고 알림

on:
  schedule:
    # 평일(월~금) 오전 10시 KST = UTC 01:00
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
    inputs:
      fetch_count:
        description: '가져올 글 수 (기본 10)'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            seen_posts.json
            failed_posts.json
          key: posts-data-${{ github.run_id }}
          restore-keys: posts-data-

      - name: Run crawler & notify
        id: crawl
        continue-on-error: true
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python main.py

      - name: Update refresh token if renewed
        if: steps.crawl.outputs.new_refresh_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set KAKAO_REFRESH_TOKEN --body "${{ steps.crawl.outputs.new_refresh_token }}" --repo ${{ github.repository }}

      - name: Alert on token error
        if: steps.crawl.outputs.token_error == 'true'
        run: |
          echo "::warning::카카오 토큰 갱신 실패! refresh_token 재발급이 필요합니다."
          echo "setup_kakao.py를 실행하여 토큰을 재발급하고 GitHub Secret을 업데이트하세요."

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history.json
          git diff --cached --quiet || git commit -m "update notification history [skip ci]"
          git push
