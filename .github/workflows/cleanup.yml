name: Cleanup old workflow runs

on:
  schedule:
    # 매주 월요일 자정 KST = 일요일 UTC 15:00
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GH_PAT }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 3
