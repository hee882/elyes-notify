<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 카카오톡 공유 시 보이는 미리보기 (OG Tags) -->
    <meta property="og:title" content="Elyes 모집공고 실시간 알림 🚀">
    <meta property="og:description" content="매일 확인하기 귀찮으셨죠? 이제 꿀공고를 카톡으로 누구보다 빠르게 받아보세요!">
    <meta property="og:image" content="./assets/elyes.png">
    <meta property="og:type" content="website">
    
    <title>Elyes 알림 구독하기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F9F9F9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 18px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        .features {
            text-align: left;
            background: #F0F4F8;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 35px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .feature-item:last-child { margin-bottom: 0; }
        .icon {
            margin-right: 10px;
            font-size: 18px;
        }
        .btn-kakao {
            background-color: #FEE500;
            color: #191919;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            display: block;
            font-size: 16px;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .btn-kakao:active {
            transform: scale(0.98);
            background-color: #FADA00;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #AAA;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./assets/elyes.png" alt="Logo" class="logo">
        <h1>Elyes 알림 서비스</h1>
        <p>놓치기 아까운 모집공고,<br>이제 카톡으로 제일 먼저 받아보세요!</p>
        
        <div class="features">
            <div class="feature-item">
                <span class="icon">⚡</span>
                <span>새로운 공고가 올라오면 즉시 알림</span>
            </div>
            <div class="feature-item">
                <span class="icon">🎯</span>
                <span>불필요한 정보 없이 핵심만 쏙쏙</span>
            </div>
            <div class="feature-item">
                <span class="icon">💬</span>
                <span>별도 앱 설치 없이 카톡으로 확인</span>
            </div>
        </div>
        
        <button id="authBtn" class="btn-kakao">카카오로 구독 시작하기</button>
        
        <div id="codeArea" style="display:none; margin-top:30px; background:#FDF2F2; padding:15px; border-radius:12px; border:1px solid #FEE2E2;">
            <p style="margin:0; font-size:13px; color:#DC2626; font-weight:600;">⚠️ 마지막 단계!</p>
            <p style="margin:5px 0 10px 0; font-size:12px;">로그인 후 주소창의 <b>code=...</b> 뒷부분을<br>복사해서 친구에게 알려주세요!</p>
        </div>

        <p class="footer">친구의 초대로 제공되는 개인 알림 서비스입니다.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('client_id');
        const redirectUri = window.location.origin + window.location.pathname.replace('subscribe.html', 'index.html'); // 실제 운영 시엔 localhost:3000 등 상황에 맞게 조절

        // 만약 쿼리스트링으로 code가 들어왔다면 (인증 후 리다이렉트된 경우)
        const authCode = urlParams.get('code');
        if (authCode) {
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('codeArea').style.display = 'block';
            document.querySelector('.features').innerHTML = `
                <div style="text-align:center; padding:10px;">
                    <p style="font-size:18px; font-weight:700; color:#191919; margin-bottom:5px;">인증 성공! 🥳</p>
                    <p style="font-size:13px; color:#555;">아래 코드를 복사해서 친구에게 보내주세요.</p>
                    <div id="codeBox" style="background:white; padding:15px; border-radius:12px; border:1px solid #EEE; font-family:monospace; font-size:16px; word-break:break-all; margin-top:10px; position:relative; cursor:pointer; transition: background 0.2s;">
                        ${authCode}
                    </div>
                    <button id="copyBtn" style="margin-top:15px; background:#333; color:white; border:none; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; width:100%;">
                        코드 복사하기
                    </button>
                </div>
            `;

            const copyToClipboard = () => {
                const tempInput = document.createElement('textarea');
                tempInput.value = authCode;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerText;
                btn.innerText = '✅ 복사 완료!';
                btn.style.background = '#059669';
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = '#333';
                }, 2000);
            };

            document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
            document.getElementById('codeBox').addEventListener('click', copyToClipboard);
        }

        document.getElementById('authBtn').addEventListener('click', () => {
            if (!clientId) {
                alert('잘못된 접근입니다. 친구가 보낸 링크를 다시 확인해주세요!');
                return;
            }
            
            // 실제 서비스용 리다이렉트 URI (로컬 테스트 시엔 localhost:3000 등)
            // 여기서는 친구가 코드를 따기 편하게 다시 이 페이지로 돌아오게 설정할 수 있습니다.
            const currentUrl = window.location.href.split('?')[0];
            const kakaoAuthUrl = `https://kauth.kakao.com/oauth/authorize?client_id=${clientId}&redirect_uri=${currentUrl}&response_type=code&scope=talk_message`;
            
            window.location.href = kakaoAuthUrl;
        });
    </script>
</body>
</html>
