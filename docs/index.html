<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elyes 모집공고 알림 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

        /* 헤더 */
        .header {
            text-align: center;
            padding: 32px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #94a3b8; margin-top: 8px; font-size: 14px; }

        /* 통계 카드 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #60a5fa;
        }
        .stat-card .label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* 테이블 */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #60a5fa;
            border-radius: 2px;
        }
        .table-wrap {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #0f172a;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px 16px;
            border-top: 1px solid #334155;
            font-size: 14px;
        }
        tr:hover td { background: #1a2744; }
        .title-cell {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 상태 뱃지 */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-sent { background: #065f46; color: #6ee7b7; }
        .badge-failed { background: #7f1d1d; color: #fca5a5; }
        .badge-pending { background: #78350f; color: #fcd34d; }

        /* 이미지 아이콘 */
        .img-icon { color: #60a5fa; font-size: 12px; }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #64748b;
        }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid #334155;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 빈 상태 */
        .empty {
            text-align: center;
            padding: 60px 0;
            color: #64748b;
        }

        /* 반응형 */
        @media (max-width: 640px) {
            .stats { grid-template-columns: 1fr; }
            .title-cell { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Elyes 모집공고 알림</h1>
            <p>평일 오전 10시 자동 실행 | 카카오톡 알림</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="value" id="totalSent">-</div>
                <div class="label">총 전송 건수</div>
            </div>
            <div class="stat-card">
                <div class="value" id="todayCount">-</div>
                <div class="label">최근 전송</div>
            </div>
            <div class="stat-card">
                <div class="value" id="lastRun">-</div>
                <div class="label">마지막 실행</div>
            </div>
        </div>

        <div class="section-title">알림 이력</div>
        <div class="table-wrap">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                데이터 불러오는 중...
            </div>
            <table id="historyTable" style="display:none;">
                <thead>
                    <tr>
                        <th>상태</th>
                        <th>제목</th>
                        <th>작성일</th>
                        <th>알림 시각</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="empty" class="empty" style="display:none;">
                아직 알림 이력이 없습니다.
            </div>
        </div>
    </div>

    <script>
        const HISTORY_URL = './history.json';

        function badgeHTML(status) {
            const map = {
                sent: '<span class="badge badge-sent">전송됨</span>',
                failed: '<span class="badge badge-failed">실패</span>',
                pending: '<span class="badge badge-pending">대기</span>',
            };
            return map[status] || status;
        }

        async function loadData() {
            try {
                const resp = await fetch(HISTORY_URL + '?t=' + Date.now());
                if (!resp.ok) throw new Error('No data');
                const data = await resp.json();
                render(data);
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('empty').style.display = 'block';
            }
        }

        function render(data) {
            const { records, stats } = data;

            document.getElementById('totalSent').textContent = stats.total_sent || 0;
            document.getElementById('lastRun').textContent = stats.last_run
                ? stats.last_run.split(' ')[1] || stats.last_run
                : '-';

            // 최근 7일 전송 건수
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const recent = records.filter(r => r.status === 'sent').length;
            document.getElementById('todayCount').textContent = recent;

            document.getElementById('loading').style.display = 'none';

            if (!records.length) {
                document.getElementById('empty').style.display = 'block';
                return;
            }

            const table = document.getElementById('historyTable');
            const tbody = document.getElementById('tableBody');
            table.style.display = 'table';

            records.forEach(r => {
                const tr = document.createElement('tr');
                const imgIcon = r.has_image ? ' <span class="img-icon">[IMG]</span>' : '';
                tr.innerHTML = `
                    <td>${badgeHTML(r.status)}</td>
                    <td class="title-cell" title="${r.title}">${r.title}${imgIcon}</td>
                    <td>${r.date}</td>
                    <td>${r.notified_at || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadData();
    </script>
</body>
</html>
